name: Daily Content Generator

on:
  schedule:
    - cron: '0 9 * * *' # Runs daily at 09:00 AM UTC
  workflow_dispatch: # Allows triggering manually from the Web App

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Create Google Credentials File
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > vitti-ideas-e5256b131985.json

      - name: Run Daily Ideas Pack Generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          RAINDROP_TOKEN: ${{ secrets.RAINDROP_TOKEN }}
          IDEAS_DOC_ID: ${{ secrets.IDEAS_DOC_ID }}
          GOOGLE_CREDENTIALS_JSON: "vitti-ideas-e5256b131985.json"
        run: python generate_raindrop_posts.py
        continue-on-error: true

      - name: Commit and Push Logs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          mkdir -p web/logs
          touch web/used_bookmarks.txt
          git add web/logs/ web/used_bookmarks.txt
          git commit -m "chore: automated content generation logs" || exit 0
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git main
